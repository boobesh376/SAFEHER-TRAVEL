# ── SafeHer CI Pipeline ──────────────────────────────────────
# Runs on every push/PR to main:
#   1. Lint (flake8)
#   2. Test (pytest + coverage)
#   3. Docker Build (verify image builds)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flake8
        run: flake8 . --max-line-length=120 --exclude=__pycache__,venv,.venv

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test_db
      SECRET_KEY: test-secret
      JWT_SECRET_KEY: test-jwt-secret
      FLASK_ENV: testing
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize test database
        run: psql $DATABASE_URL -f database/schema.sql
        env:
          PGPASSWORD: test

      - name: Run tests with coverage
        run: python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing

  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t safeher-backend ./backend
