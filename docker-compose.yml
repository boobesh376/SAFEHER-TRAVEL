# ── SafeHer – Docker Compose ─────────────────────────────────
# Usage:
#   docker compose up --build        (start)
#   docker compose down              (stop)
#   docker compose logs -f backend   (view logs)

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - ./backend/.env
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; r=requests.get('http://localhost:5000/api/health'); exit(0 if r.ok else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
